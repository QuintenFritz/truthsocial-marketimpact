# Run met:  pre-commit install   (eenmalig)
# Daarna runnen hooks automatisch op `git commit`.

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-added-large-files
        args: ["--maxkb=1000"]    # voorkomt per ongeluk data committen
      - id: check-merge-conflict
      - id: debug-statements

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.4.10
    hooks:
      - id: ruff
        args: ["--fix"]
      - id: ruff-format

  - repo: https://github.com/kynan/nbstripout
    rev: 0.7.1
    hooks:
      - id: nbstripout
        # Strip outputs uit notebooks vóór commit — voorkomt diff-vervuiling
        # en verkleint repo. Outputs blijven lokaal in je werkdir.
